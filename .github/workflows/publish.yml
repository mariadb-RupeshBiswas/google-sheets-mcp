name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && github.ref_protected == true
    runs-on: ubuntu-latest
    environment: pypi
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build

      - name: Check whether built artifacts already exist on PyPI
        id: publish_status
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          package_name = project["name"]
          version = project["version"]
          built_files = sorted(
              path.name for path in Path("dist").iterdir() if path.is_file()
          )

          existing_files = set()
          url = f"https://pypi.org/pypi/{package_name}/json"
          try:
              with urllib.request.urlopen(url, timeout=10) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              for file_info in payload.get("releases", {}).get(version, []):
                  filename = file_info.get("filename")
                  if filename:
                      existing_files.add(filename)

          missing_files = [name for name in built_files if name not in existing_files]
          should_publish = bool(missing_files)
          reason = (
              f"Missing files for {package_name} {version}: {', '.join(missing_files)}"
              if should_publish
              else f"All built artifacts for {package_name} {version} already exist on PyPI."
          )

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"package_name={package_name}\n")
              fh.write(f"version={version}\n")
              fh.write(f"should_publish={'true' if should_publish else 'false'}\n")
              fh.write("reason<<EOF\n")
              fh.write(reason + "\n")
              fh.write("EOF\n")
          PY

      - name: Skip publish when release already exists
        if: steps.publish_status.outputs.should_publish != 'true'
        run: echo "${{ steps.publish_status.outputs.reason }}"

      - name: Publish to PyPI
        if: steps.publish_status.outputs.should_publish == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI__TOKEN__ }}
        run: uv publish --check-url https://pypi.org/simple/
