name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Least-privilege: CI only needs to read the repo to run lint/types/tests.
# Without this block GITHUB_TOKEN inherits the repo's default broad scope,
# which CodeQL correctly flags as a hardening gap.
permissions:
  contents: read

env:
  # Force JS actions onto Node 24 ahead of GitHub's June 2026 mandatory flip;
  # lets us verify the toolchain on Node 24 before the deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest tests/ --ignore=tests/test_integration.py -q
